<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Navigation Bar</title>
    <style>
        body {
            margin: 0;
            background-color: #ccc; /* Màu nền xám như trong ảnh */
            font-family: serif;
        }

        /* Định dạng thanh Navigation */
        nav {
            background-color: #444; /* Màu nền xám đậm */
            padding: 20px 0;
            text-align: center; /* Căn giữa các mục menu */
        }

        /* Loại bỏ dấu chấm tròn mặc định của danh sách */
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        /* Biến các mục danh sách thành hàng ngang */
        nav li {
            display: inline;
            margin: 0 20px;
        }

        /* Định dạng các đường link */
        nav a {
            color: white;
            text-decoration: none; /* Bỏ gạch chân */
            font-size: 1.2em;
            font-weight: bold;
        }

        /* Hiệu ứng khi di chuột qua (tùy chọn thêm cho chuyên nghiệp) */
        nav a:hover {
            color: #ffcc00; /* Đổi màu khi hover */
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Tutorials</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Newsletter</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

</body>
</html>
