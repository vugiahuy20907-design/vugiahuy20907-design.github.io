<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Page Content</title>
    <style>
        /* Một chút CSS để bạn dễ hình dung cấu trúc giống trong ảnh */
        section { border: 2px solid #888; padding: 20px; background-color: #f0f0f0; }
        article { border: 1px solid #aaa; margin-bottom: 15px; padding: 10px; background-color: #e0e0e0; }
        header { border-bottom: 1px solid #ccc; margin-bottom: 10px; }
        h2 { margin: 0; }
        i { font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

    <section>
        <article>
            <header>
                <h2>Just Another Day</h2>
                <p><i>Written by Christina on January 11th</i></p>
            </header>
            <p>This is my second blog entry, and I just wanted to check in on you</p>
        </article>

        <article>
            <header>
                <h2>My First Blog Entry</h2>
                <p><i>Written by Christina on January 10th</i></p>
            </header>
            <p>I'm so happy to write my first blog entry – yay!</p>
        </article>
    </section>

</body>
</html>
